<!DOCTYPE html>

<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
<title>ObamaDash — Timeout Sweep</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box;}
html,body{background:#030803;color:#00cc33;font-family:'Share Tech Mono',monospace;font-size:11px;}
body{padding:12px 10px;}
input{background:#000;border:1px solid #0f2a0f;color:#00cc33;
  font-family:'Share Tech Mono',monospace;font-size:11px;width:90px;padding:3px 6px;text-align:right;}
.row{display:flex;justify-content:space-between;margin-bottom:8px;}
.lbl{color:#006618;font-size:9px;letter-spacing:1px;line-height:1.8;}
.panel{border:1px solid #0f2a0f;padding:10px;margin-bottom:12px;}
.ptitle{color:#006618;font-size:9px;letter-spacing:3px;margin-bottom:10px;}
button.run{width:100%;background:#001a06;border:1px solid #00cc33;color:#00cc33;
  font-family:'Share Tech Mono',monospace;font-size:11px;letter-spacing:3px;
  padding:12px;cursor:pointer;margin-bottom:12px;}
button.run:disabled{opacity:0.4;}
.lvl{background:#030803;border:1px solid #0f2a0f;color:#006618;
  font-family:'Share Tech Mono',monospace;font-size:9px;padding:4px 8px;cursor:pointer;}
.lvl.on{border-color:#00cc33;color:#00cc33;background:#001a06;}
#log{color:#006618;font-size:9px;letter-spacing:1px;min-height:20px;margin-bottom:12px;word-break:break-all;}
table{width:100%;border-collapse:collapse;font-size:9px;letter-spacing:1px;}
th{color:#006618;border-bottom:1px solid #0f2a0f;padding:4px 4px;text-align:right;font-weight:normal;}
th:first-child{text-align:left;}
td{padding:4px 4px;border-bottom:1px solid #030d03;text-align:right;color:#004a14;}
td:first-child{text-align:left;color:#006618;}
tr.best td{color:#00cc33!important;}
.g{color:#00cc33!important;}.r{color:#ff3131!important;}.a{color:#ffb300!important;}
</style>
</head>
<body>

<div style="color:#00cc33;letter-spacing:4px;font-size:11px;margin-bottom:12px;">// TIMEOUT SWEEP</div>

<div class="panel">
  <div class="ptitle">// CONFIG</div>
  <div class="row"><span class="lbl">DAYS</span><input id="days" type="number" value="1800"></div>
  <div class="row"><span class="lbl">RISK ($)</span><input id="risk" type="number" value="1000"></div>
  <div class="row"><span class="lbl">RR RATIO</span><input id="rr" type="number" value="0.3" step="0.05"></div>
  <div class="row"><span class="lbl">STOP DIST ($)</span><input id="stop" type="number" value="3000"></div>
  <div class="row"><span class="lbl">FEE (%)</span><input id="fee" type="number" value="0.02" step="0.005"></div>
  <div class="row"><span class="lbl">TOLERANCE (%)</span><input id="tol" type="number" value="0.08" step="0.01"></div>
  <div class="row"><span class="lbl">MIN BAR</span><input id="minbar" type="number" value="5"></div>
</div>

<div class="panel">
  <div class="ptitle">// SWEEP RANGE</div>
  <div class="row"><span class="lbl">FROM (bars)</span><input id="from" type="number" value="10"></div>
  <div class="row"><span class="lbl">TO (bars)</span><input id="to" type="number" value="500"></div>
  <div class="row"><span class="lbl">STEP (bars)</span><input id="step" type="number" value="10"></div>
</div>

<div class="panel">
  <div class="ptitle">// FAN LEVELS</div>
  <div id="lvls" style="display:flex;flex-wrap:wrap;gap:6px;"></div>
</div>

<button class="run" id="runbtn" onclick="go()">▶ RUN SWEEP</button>

<div id="log">READY</div>

<div id="out"></div>

<script>
var DEGS=[27,-27,45,-45,60,-60,72,-72,78,-78];
var lvlEl=document.getElementById('lvls');
DEGS.forEach(function(d){
  var b=document.createElement('button');
  b.className='lvl on';
  b.textContent=(d>0?'+':'')+d;
  b.dataset.deg=d;
  b.onclick=function(){this.classList.toggle('on');};
  lvlEl.appendChild(b);
});

function log(s){ document.getElementById('log').textContent=s; }

function g(id){ return document.getElementById(id).value; }

function anchor(ts){
  var d=new Date(ts);
  var a=new Date(Date.UTC(d.getUTCFullYear(),d.getUTCMonth(),d.getUTCDate(),9,0,0));
  if(a>d) a.setUTCDate(a.getUTCDate()-1);
  return a;
}

function fanP(open,bars,deg){
  return open + bars*Math.tan(deg*Math.PI/180);
}

function tick(){ return new Promise(function(r){setTimeout(r,0);}); }

function loadCache(days){
  try{
    var k='obd_'+days+'_'+new Date().toISOString().slice(0,10);
    var d=localStorage.getItem(k);
    return d?JSON.parse(d):null;
  }catch(e){return null;}
}
function saveCache(days,c){
  try{
    var k='obd_'+days+'_'+new Date().toISOString().slice(0,10);
    localStorage.setItem(k,JSON.stringify(c));
  }catch(e){}
}

async function fetchAll(days){
  var now=Date.now(), start=now-days*86400000;
  var all=[], cur=start;
  var n=0;
  while(cur<now){
    var end=Math.min(cur+60000000,now);
    var url='https://api.binance.com/api/v3/klines?symbol=BTCUSDT&interval=1m'
      +'&startTime='+cur+'&endTime='+end+'&limit=1000';
    var r=await fetch(url);
    if(!r.ok) throw new Error('HTTP '+r.status);
    var d=await r.json();
    if(!d.length) break;
    d.forEach(function(k){
      all.push({time:k[0]/1000,open:+k[1],high:+k[2],low:+k[3],close:+k[4]});
    });
    cur=d[d.length-1][0]+60000;
    n++;
    if(n%5===0){
      var pct=Math.round((cur-start)/(now-start)*100);
      log('FETCHING... '+pct+'% ('+all.length+' candles)');
      await tick();
    }
  }
  return all;
}

function scanSigs(candles, cfg){
  var ao={};
  candles.forEach(function(c){
    var a=anchor(c.time*1000);
    var k=a.toISOString().slice(0,10);
    if(!ao[k] && Math.abs(c.time-a.getTime()/1000)<180) ao[k]=c.open;
  });
  var sigs=[], deb={};
  for(var i=2;i<candles.length-10;i++){
    var c=candles[i];
    var a=anchor(c.time*1000);
    var ak=a.toISOString().slice(0,10);
    if(!ao[ak]) continue;
    if(new Date(c.time*1000).toISOString().slice(0,10)!==ak) continue;
    var bar=Math.floor((c.time-a.getTime()/1000)/60);
    if(bar<cfg.minBar) continue;
    for(var di=0;di<cfg.levels.length;di++){
      var deg=cfg.levels[di];
      var lbl=(deg>0?'L+':'L')+deg;
      var price=fanP(ao[ak],bar,deg);
      var tol=price*cfg.tolPct;
      var dk=ak+'_'+lbl;
      if(c.low<=price+tol&&c.low>=price-tol&&c.close>price&&!deb[dk]){
        deb[dk]=true;
        var e=c.close,ps=cfg.risk/cfg.stopDist,fc=ps*e*cfg.feeRate*2;
        sigs.push({i:i+1,dir:1,e:e,ps:ps,fc:fc,tp:e+cfg.stopDist*cfg.rrRatio,sl:e-cfg.stopDist});
        continue;
      }
      if(c.high>=price-tol&&c.high<=price+tol&&c.close<price&&!deb[dk]){
        deb[dk]=true;
        var e2=c.close,ps2=cfg.risk/cfg.stopDist,fc2=ps2*e2*cfg.feeRate*2;
        sigs.push({i:i+1,dir:-1,e:e2,ps:ps2,fc:fc2,tp:e2-cfg.stopDist*cfg.rrRatio,sl:e2+cfg.stopDist});
      }
    }
  }
  return sigs;
}

function simOne(candles, sigs, tmo, days){
  var wins=0,losses=0,tmos=0,net=0,tmoNet=0,peak=0,run=0,maxDD=0;
  for(var si=0;si<sigs.length;si++){
    var s=sigs[si];
    var lim=Math.min(s.i+tmo,candles.length);
    var res='T', ep=candles[lim-1]?candles[lim-1].close:s.e;
    for(var j=s.i;j<lim;j++){
      var p=candles[j].close;
      if(s.dir===1){
        if(p>=s.tp){res='W';ep=p;break;}
        if(p<=s.sl){res='L';ep=p;break;}
      } else {
        if(p<=s.tp){res='W';ep=p;break;}
        if(p>=s.sl){res='L';ep=p;break;}
      }
    }
    var t;
    if(res==='W'){wins++;t=s.ps*Math.abs(s.tp-s.e)-s.fc;}
    else if(res==='L'){losses++;t=-s.ps*Math.abs(s.sl-s.e)-s.fc;}
    else{tmos++;t=(ep-s.e)*s.dir*s.ps-s.fc;tmoNet+=t;}
    net+=t; run+=t;
    if(run>peak) peak=run;
    var dd=peak-run;
    if(dd>maxDD) maxDD=dd;
  }
  var tot=wins+losses+tmos, dec=wins+losses;
  var wrAll=tot>0?wins/tot*100:0, wrWL=dec>0?wins/dec*100:0;
  var ann=net*(365/days);
  var calmar=maxDD>0?(ann/maxDD):null;
  return {tmo:tmo,wins:wins,losses:losses,tmos:tmos,
    net:net,tmoNet:tmoNet,wrAll:wrAll,wrWL:wrWL,
    maxDD:maxDD,calmar:calmar,dec:dec};
}

function fmt(n){return n>=0?'$'+n.toFixed(0):'$'+n.toFixed(0);}

function renderTable(rows){
  var best=rows[0];
  rows.forEach(function(r){if(r.net>best.net) best=r;});
  var firstPos=null;
  rows.forEach(function(r){if(r.net>0&&!firstPos) firstPos=r;});

  var html='<div style="border:1px solid #00cc33;background:#001a06;padding:10px;margin-bottom:14px;">';
  html+='<div style="color:#006618;font-size:9px;letter-spacing:2px;margin-bottom:6px;">'
    +'OPTIMAL: '+best.tmo+' BARS (~'+(best.tmo/60).toFixed(1)+'h)'
    +(firstPos?' | FIRST +: '+firstPos.tmo+' bars':' | NO POSITIVE IN RANGE')+'</div>';
  html+='<div style="display:grid;grid-template-columns:1fr 1fr;gap:6px;">';
  var pc=best.net>=0?'g':'r';
  var wc=best.wrAll>=76.9?'g':'r';
  html+='<div style="border:1px solid #0f2a0f;padding:6px;">'
    +'<div style="color:#004a14;font-size:9px;">NET PNL</div>'
    +'<div style="font-size:18px;" class="'+pc+'">'+fmt(best.net)+'</div>'
    +'<div style="color:#004a14;font-size:9px;">'+( best.net/365).toFixed(2)+'/day (ann)</div></div>';
  html+='<div style="border:1px solid #0f2a0f;padding:6px;">'
    +'<div style="color:#004a14;font-size:9px;">WIN RATE ALL</div>'
    +'<div style="font-size:18px;" class="'+wc+'">'+best.wrAll.toFixed(1)+'%</div>'
    +'<div style="color:#004a14;font-size:9px;">W/L ONLY: '+best.wrWL.toFixed(1)+'%</div></div>';
  html+='<div style="border:1px solid #0f2a0f;padding:6px;">'
    +'<div style="color:#004a14;font-size:9px;">RESOLVED / FORCED</div>'
    +'<div style="font-size:18px;color:#ffb300;">'+best.dec+' / '+best.tmos+'</div>'
    +'<div style="color:#004a14;font-size:9px;">TMO PNL: '+fmt(best.tmoNet)+'</div></div>';
  html+='<div style="border:1px solid #0f2a0f;padding:6px;">'
    +'<div style="color:#004a14;font-size:9px;">MAX DRAWDOWN</div>'
    +'<div style="font-size:18px;color:#ff3131;">$'+best.maxDD.toFixed(0)+'</div>'
    +'<div style="color:#004a14;font-size:9px;">CALMAR: '+(best.calmar!=null?best.calmar.toFixed(2):'inf')+'</div></div>';
  html+='</div></div>';

  html+='<table><thead><tr>'
    +'<th>BARS</th><th>TIME</th><th>NET PNL</th>'
    +'<th>WR ALL</th><th>WR W/L</th>'
    +'<th>RESOLVED</th><th>FORCED</th><th>TMO PNL</th>'
    +'<th>MAX DD</th><th>CALMAR</th>'
    +'</tr></thead><tbody>';

  rows.forEach(function(r){
    var isBest=r.tmo===best.tmo;
    var cls=isBest?'best':'';
    var pc2=r.net>=0?'g':'r';
    var wc2=r.wrAll>=76.9?'g':'r';
    var tc=r.tmoNet>=0?'g':'r';
    var cal=r.calmar!=null?r.calmar.toFixed(2):'inf';
    var cc=r.calmar!=null&&r.calmar>=1?'g':r.calmar!=null&&r.calmar>=0?'a':'r';
    html+='<tr class="'+cls+'">'
      +'<td>'+r.tmo+(isBest?' ★':'')+'</td>'
      +'<td>'+(r.tmo/60).toFixed(1)+'h</td>'
      +'<td class="'+pc2+'">'+fmt(r.net)+'</td>'
      +'<td class="'+wc2+'">'+r.wrAll.toFixed(1)+'%</td>'
      +'<td>'+r.wrWL.toFixed(1)+'%</td>'
      +'<td>'+r.dec+'</td>'
      +'<td>'+r.tmos+'</td>'
      +'<td class="'+tc+'">'+fmt(r.tmoNet)+'</td>'
      +'<td class="r">$'+r.maxDD.toFixed(0)+'</td>'
      +'<td class="'+cc+'">'+cal+'</td>'
      +'</tr>';
  });
  html+='</tbody></table>';
  document.getElementById('out').innerHTML=html;
}

async function go(){
  var btn=document.getElementById('runbtn');
  btn.disabled=true;
  document.getElementById('out').innerHTML='';
  try{
    var days=parseInt(g('days'))||1800;
    var risk=parseFloat(g('risk'))||1000;
    var rrRatio=parseFloat(g('rr'))||0.3;
    var stopDist=parseFloat(g('stop'))||3000;
    var feeRate=parseFloat(g('fee'))/100;
    var tolPct=parseFloat(g('tol'))/100;
    var minBar=parseInt(g('minbar'))||5;
    var from=parseInt(g('from'))||10;
    var to=parseInt(g('to'))||500;
    var step=parseInt(g('step'))||10;
    var levels=[];
    document.querySelectorAll('.lvl.on').forEach(function(b){
      levels.push(parseInt(b.dataset.deg));
    });
    if(!levels.length){alert('SELECT LEVELS');btn.disabled=false;return;}

    log('CHECKING CACHE...');
    await tick();
    var candles=loadCache(days);
    if(candles){
      log('CACHE HIT — '+candles.length+' CANDLES');
      await tick();
    } else {
      candles=await fetchAll(days);
      saveCache(days,candles);
      log('FETCHED '+candles.length+' CANDLES — SCANNING...');
      await tick();
    }

    var cfg={risk:risk,rrRatio:rrRatio,stopDist:stopDist,
             feeRate:feeRate,tolPct:tolPct,minBar:minBar,levels:levels};
    log('SCANNING SIGNALS...');
    await tick();
    var sigs=scanSigs(candles,cfg);
    log('FOUND '+sigs.length+' SIGNALS — SWEEPING...');
    await tick();

    var rows=[];
    var steps=Math.floor((to-from)/step)+1;
    var done=0;
    for(var t=from;t<=to;t+=step){
      rows.push(simOne(candles,sigs,t,days));
      done++;
      if(done%10===0){
        log('SWEEP '+done+'/'+steps+' (bar '+t+')');
        await tick();
      }
    }
    log('DONE — '+rows.length+' STEPS');
    renderTable(rows);
  } catch(err){
    log('ERROR: '+err.message);
    console.error(err);
  }
  btn.disabled=false;
}
</script>

</body>
</html>
